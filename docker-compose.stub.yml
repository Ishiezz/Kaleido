version: "3.9"

# CPU-only stub stack — no GPU, no Postgres, no vLLM required.
# All scores return 0 with uniform confidence (stub backend).
# Usage: docker-compose -f docker-compose.stub.yml up --build

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: uvicorn kaleido.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      KALEIDO_BACKEND: stub
      KALEIDO_DATABASE_URL: sqlite+aiosqlite:///./kaleido.db
      KALEIDO_FACETS_CSV_PATH: data/processed/facets_enriched.csv
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      KALEIDO_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
